name: Backend CI/CD
 
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'k8s/**'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'k8s/**'
  workflow_dispatch:
 
env:
  AWS_REGION:       ${{ secrets.AWS_REGION }}
  ECR_REGISTRY:     ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY:   starttech-backend-api
  EKS_CLUSTER_NAME: starttech-cluster
  IMAGE_TAG:        ${{ github.sha }}
 
jobs:
  # ─── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/MuchToDo
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/MuchToDo/go.sum
 
      - name: Download dependencies
        run: go mod download
 
      - name: Run tests
        run: go test ./... -v -cover
        env:
          MONGO_URI:           ${{ secrets.MONGO_URI }}
          DB_NAME:             starttech
          JWT_SECRET_KEY:      ${{ secrets.JWT_SECRET_KEY }}
          JWT_EXPIRATION_HOURS: 72
          LOG_LEVEL:           INFO
          LOG_FORMAT:          json
 
  # ─── Job 2: Build and Push Docker Image ──────────────────────────────────────
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image: ${{ steps.build-image.outputs.image }}
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}
 
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Build Docker image
        id: build-image
        working-directory: backend/MuchToDo
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          LATEST_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
 
          docker build \
            -t $IMAGE_URI \
            -t $LATEST_URI \
            .
 
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "Built image: $IMAGE_URI"
 
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build-image.outputs.image }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true
 
      - name: Push Docker image to ECR
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          LATEST_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
 
          docker push $IMAGE_URI
          docker push $LATEST_URI
 
          echo "Pushed: $IMAGE_URI"
          echo "Pushed: $LATEST_URI"
 
  # ─── Job 3: Deploy to EKS ────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}
 
      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}
 
      - name: Update deployment manifest with new image tag
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
 
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" k8s/deployment.yaml
 
          echo "Updated deployment.yaml with image: $IMAGE_URI"
          cat k8s/deployment.yaml
 
      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/
          echo "Applied all Kubernetes manifests ✓"
 
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/backend-api \
            --timeout=300s
          echo "Rollout successful ✓"
 
      - name: Verify pods are running
        run: |
          kubectl get pods -l app=backend-api
          kubectl get services
          kubectl get ingress
 
      - name: Post deployment summary
        if: always()
        run: |
          echo "## Backend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Output | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} |" >> $GITHUB_STEP_SUMMARY
          echo "| EKS Cluster | ${{ env.EKS_CLUSTER_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rollout | ✅ Success |" >> $GITHUB_STEP_SUMMARY